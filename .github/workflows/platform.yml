name: Platform Verification

on:
  pull_request:
    paths:
      - ".github/workflows/platform.yml"
      - "build-logic/**"
      - "core/**"
      - "shared/**"
      - "gradle/**"
      - "gradle.properties"
      - "settings.gradle.kts"
      - "build.gradle.kts"
  push:
    branches: [master]
    paths:
      - ".github/workflows/platform.yml"
      - "build-logic/**"
      - "core/**"
      - "shared/**"
      - "gradle/**"
      - "gradle.properties"
      - "settings.gradle.kts"
      - "build.gradle.kts"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  android-shared:
    name: Android shared modules
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - name: Compile Android shared modules
        run: ./gradlew --no-daemon :checkSharedUiBoundary :core:compileDebugKotlinAndroid :shared:compileDebugKotlinAndroid
