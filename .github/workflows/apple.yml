name: Apple

on:
  pull_request:
    paths:
      - ".github/workflows/apple.yml"
      - "appleApp/**"
      - "build-logic/**"
      - "core/**"
      - "shared/**"
      - "gradle/**"
      - "gradle.properties"
      - "settings.gradle.kts"
      - "build.gradle.kts"
  push:
    branches: [master]
    paths:
      - ".github/workflows/apple.yml"
      - "appleApp/**"
      - "build-logic/**"
      - "core/**"
      - "shared/**"
      - "gradle/**"
      - "gradle.properties"
      - "settings.gradle.kts"
      - "build.gradle.kts"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ios:
    name: iOS simulator
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up XcodeGen
        run: |
          if ! command -v xcodegen >/dev/null; then
            brew install xcodegen
          fi

      - name: Verify shared iOS code
        run: ./gradlew --no-daemon :shared:iosSimulatorArm64Test

      - name: Generate Apple host project
        working-directory: appleApp
        run: xcodegen generate

      - name: Build iOS host
        run: >-
          xcodebuild
          -project appleApp/FluxaApple.xcodeproj
          -scheme FluxaIos
          -sdk iphonesimulator
          -destination 'generic/platform=iOS Simulator'
          CODE_SIGNING_ALLOWED=NO
          build

  tvos:
    name: tvOS simulator
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up XcodeGen
        run: |
          if ! command -v xcodegen >/dev/null; then
            brew install xcodegen
          fi

      - name: Build tvOS shared core
        run: ./gradlew --no-daemon :core:linkDebugFrameworkTvosSimulatorArm64

      - name: Generate Apple host project
        working-directory: appleApp
        run: xcodegen generate

      - name: Build tvOS host
        run: >-
          xcodebuild
          -project appleApp/FluxaApple.xcodeproj
          -scheme FluxaTvos
          -sdk appletvsimulator
          -destination 'generic/platform=tvOS Simulator'
          CODE_SIGNING_ALLOWED=NO
          build
